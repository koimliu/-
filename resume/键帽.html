<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>3d css keys (&#39;real&#39; volume + exact calculations)</title>
<style>
.key {
  font-size: clamp(0.9rem, 2.467vw + 0.283rem, 2.75rem);
  background: conic-gradient(from 45deg, var(--top) 25%, var(--right) 0, var(--right) 50%, var(--bottom) 0, var(--bottom) 75%, var(--left) 0);
  font-family: system-ui, sans-serif;
  font-weight: bold;
  width: 3em;
  height: 3em;
  position: relative;
  transform-style: preserve-3d;
  color: var(--text);
  --top: var(--color);
  --right: lch(from var(--color) calc(l - 15) c h);
  --bottom: lch(from var(--color) calc(l - 25) c h);
  --left: lch(from var(--color) calc(l - 10) c h);
  --text: lch(from var(--color) calc(l - 40) c h);
  --face: lch(from var(--color) calc(l + 5) c h);
  --calc-x: calc(-1 * (var(--mouse-y) - var(--y) + (var(--height) / 2)) / 12);
  --calc-y: calc((var(--mouse-x) - var(--x) + (var(--width) / 2)) / 12);
  --clamped-x: clamp(-90deg, (var(--calc-x, 0) * 1deg) + var(--offset-x), 90deg);
  --clamped-y: clamp(-90deg, (var(--calc-y, 0) * 1deg) + var(--offset-y), 90deg);
  translate: calc(var(--calc-y) * 2px * (var(--seed) * 0.1)) calc(var(--calc-x) * -2px * (var(--seed) * 0.1));
  transform: rotateX(var(--clamped-x)) rotateY(var(--clamped-y)) translateY(calc(0.15em * var(--seed)));
}
.key:nth-child(odd) {
  transform: rotateX(var(--clamped-x)) rotateY(var(--clamped-y)) translateY(calc(-0.15em * var(--seed)));
}
.key .sides, .key .face {
  transform-style: preserve-3d;
  position: absolute;
  inset: 0;
}
.key::before, .key::after,
.key .sides::before,
.key .sides::after {
  content: "";
  position: absolute;
  width: 3em;
  height: 2.1476731595em;
  bottom: 50%;
  clip-path: polygon(0.45em 0%, calc(100% - 0.45em) 0%, 100% 100%, 0% 100%);
  background: var(--bg, var(--top));
  transform-origin: center bottom;
  transform: rotate(var(--turn, 0turn)) translateY(-1.5em) rotateX(-102.094757077deg);
}
.key .sides::after {
  --turn: 0.25turn;
  --bg: var(--right);
}
.key::after {
  --turn: 0.5turn;
  --bg: var(--bottom);
}
.key .sides::before {
  --turn: 0.75turn;
  --bg: var(--left);
}
.key .face {
  transform: translateZ(2.1em);
  margin: auto;
  width: 2.1em;
  height: 2.1em;
  padding: 0.2em 0.35em;
  background: conic-gradient(var(--top) 25%, var(--right) 0, var(--right) 50%, var(--bottom) 0, var(--bottom) 75%, var(--left) 0);
  scale: 1.0175;
}
.key .face::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  border-radius: 0.5em;
  background: var(--face);
}
.key:nth-child(even) {
  --offset-x: calc(-4deg * var(--seed));
  --offset-y: calc(3deg * var(--seed));
}
.key:nth-child(odd) {
  --offset-x: calc(4deg * var(--seed));
  --offset-y: calc(-3deg * var(--seed));
}

#scene {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(0.9rem, 2.8vw + 0.2rem, 3rem);
  justify-content: center;
  height: 100%;
  width: 100%;
  perspective: 1000px;
  align-content: center;
}

body,
html {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #00040e;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}
</style>

</head>

<body translate="no">
  <div id='scene'>

    <div class='key' style='--seed: 3.4; --color: #2f4858;'>
        <div class='face'>H</div>
        <div class='sides'></div>
    </div>

    <div class='key' style='--seed: 1.6; --color: #33658a'>
        <div class='face'>E</div>
        <div class='sides'></div>
    </div>

    <div class='key' style='--seed: 4.5; --color: #86bbd8'>
        <div class='face'>L</div>
        <div class='sides'></div>
    </div>

    <div class='key' style='--seed: 2.2; --color: #f6ae2d'>
        <div class='face'>L</div>
        <div class='sides'></div>
    </div>

    <div class='key' style='--seed: 4.7; --color: #f26419'>
        <div class='face'>O</div>
        <div class='sides'></div>
    </div>

</div>

      <script id="rendered-js" >
const multiple = 9;
const scene = document.getElementById("scene");
const keys = scene.children;

const resizeObserver = new ResizeObserver(entries => {
  for (let entry of entries) {
    const { width, height } = entry.contentRect;
    entry.target.style.setProperty('--width', width);
    entry.target.style.setProperty('--height', height);

    const rect = entry.target.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    entry.target.style.setProperty('--x', centerX);
    entry.target.style.setProperty('--y', centerY);
  }
});

for (let i = 0; i < keys.length; i++) {
  resizeObserver.observe(keys[i]);
}

var x = window.innerWidth / 2;
var y = window.innerHeight / 2;
var ballX = x;
var ballY = y;

const lerp = (x, y, a) => x * (1 - a) + y * a;

let animationFrameId;

function loop() {
  ballX = lerp(ballX, x, 0.08);
  ballY = lerp(ballY, y, 0.08);
  scene.style.setProperty('--mouse-x', ballX);
  scene.style.setProperty('--mouse-y', ballY);

  if (Math.abs(ballX - x) > 0.1 || Math.abs(ballY - y) > 0.1) {
    animationFrameId = requestAnimationFrame(loop);
  } else {
    animationFrameId = null;
  }
}

function mousemove(e) {
  x = e.pageX;
  y = e.pageY;

  if (!animationFrameId) {
    loop();
  }
}

function touch(e) {
  if (e.changedTouches) {
    const touch = e.changedTouches[0];
    x = touch.pageX;
    y = touch.pageY;

    if (!animationFrameId) {
      loop();
    }
  }
}

scene.addEventListener('touchstart', touch);
scene.addEventListener('touchmove', touch);
scene.addEventListener('mousemove', mousemove);
    </script>
</body>

</html>
